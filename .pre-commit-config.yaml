# Shift-Left: Execução local antes do push
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.18.1
    hooks:
      - id: gitleaks
        description: Detect hardcoded secrets prior to commit

  # React Native linting and formatting
  - repo: local
    hooks:
      - id: npm-lint
        name: Lint React Native
        entry: bash -c 'npm run lint'
        language: system
        types_or: [javascript, typescript]
        pass_filenames: false
